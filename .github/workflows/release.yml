name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: nexterm

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexterm.exe
            archive: nexterm-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nexterm
            archive: nexterm-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nexterm
            archive: nexterm-macos-aarch64.dmg

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      # Linux: install system deps for wgpu/winit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libx11-dev libvulkan-dev libgtk-3-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p nexterm

      # Windows: zip the .exe
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      # Linux: plain tar.gz with the binary.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.artifact }}

      # macOS: build a proper .app bundle (Info.plist + .icns from
      # assets/icon.png) and hand it to `hdiutil` as a read-only,
      # zlib-compressed UDZO DMG.  The staging folder also contains a
      # symlink to /Applications so the mounted image shows the
      # classic "drag NexTerm into Applications" affordance.  No
      # code-signing: open-source builds ship unsigned and the user
      # can right-click → Open on first launch to bypass Gatekeeper.
      - name: Package (macOS DMG)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          APP="NexTerm.app"
          BIN="target/${{ matrix.target }}/release/${{ matrix.artifact }}"

          # --- .app bundle skeleton -------------------------------------------------
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/nexterm"
          chmod +x "$APP/Contents/MacOS/nexterm"

          # --- icon: assets/icon.png -> icon.icns via sips + iconutil --------------
          mkdir -p icon.iconset
          for SIZE in 16 32 128 256 512; do
            sips -z $SIZE $SIZE assets/icon.png \
              --out "icon.iconset/icon_${SIZE}x${SIZE}.png" > /dev/null
            DOUBLE=$((SIZE * 2))
            sips -z $DOUBLE $DOUBLE assets/icon.png \
              --out "icon.iconset/icon_${SIZE}x${SIZE}@2x.png" > /dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"

          # --- Info.plist (minimal but complete) ------------------------------------
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>NexTerm</string>
            <key>CFBundleDisplayName</key><string>NexTerm</string>
            <key>CFBundleIdentifier</key><string>dev.nexterm.app</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>nexterm</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          # --- staging dir with /Applications symlink for drag-to-install ----------
          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          # --- hdiutil: zlib-compressed read-only DMG ------------------------------
          hdiutil create \
            -volname "NexTerm" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "## NexTerm $TAG" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "| Platform | Architecture | File |" >> RELEASE_NOTES.md
          echo "|----------|-------------|------|" >> RELEASE_NOTES.md
          echo "| Windows  | x86_64      | \`nexterm-windows-x86_64.zip\` |" >> RELEASE_NOTES.md
          echo "| Linux    | x86_64      | \`nexterm-linux-x86_64.tar.gz\` |" >> RELEASE_NOTES.md
          echo "| macOS    | Apple Silicon (aarch64) | \`nexterm-macos-aarch64.dmg\` |" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: NexTerm ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
