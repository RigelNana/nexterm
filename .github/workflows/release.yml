name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: nexterm

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexterm.exe
            archive: nexterm-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nexterm
            archive: nexterm-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nexterm
            archive: nexterm-macos-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: nexterm
            archive: nexterm-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      # Linux: install system deps for wgpu/winit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libx11-dev libvulkan-dev libgtk-3-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p nexterm

      # Windows: zip the .exe
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          Compress-Archive -Path $bin -DestinationPath ${{ matrix.archive }}

      # Unix: tar.gz
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "## NexTerm $TAG" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Downloads" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "| Platform | Architecture | File |" >> RELEASE_NOTES.md
          echo "|----------|-------------|------|" >> RELEASE_NOTES.md
          echo "| Windows  | x86_64      | \`nexterm-windows-x86_64.zip\` |" >> RELEASE_NOTES.md
          echo "| Linux    | x86_64      | \`nexterm-linux-x86_64.tar.gz\` |" >> RELEASE_NOTES.md
          echo "| macOS    | Apple Silicon (aarch64) | \`nexterm-macos-aarch64.tar.gz\` |" >> RELEASE_NOTES.md
          echo "| macOS    | Intel (x86_64) | \`nexterm-macos-x86_64.tar.gz\` |" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: NexTerm ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
